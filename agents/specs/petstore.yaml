openapi: 3.0.0

info:
  title: Pet API
  version: 1.0

paths:
  /pet:
    post:
      summary: Create Pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                status:
                  type: string